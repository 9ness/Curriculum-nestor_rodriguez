<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acceso · Panel privado</title>
<meta name="robots" content="noindex" />
<style>
  :root{--bg:#0b0f17;--card:#151d2c;--bg2:#111826;--line:#233149;--txt:#e8edf5;--muted:#9fb0c9;--accent:#5b8cff;--green:#22d3a5}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{max-width:380px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px 26px}
  .eyebrow{color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:12px;text-align:center}
  h1{font-size:22px;font-weight:800;margin:8px 0 6px;text-align:center}
  p.sub{color:var(--muted);font-size:14px;text-align:center;margin-bottom:22px}
  label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:13px 14px;color:var(--txt);font-size:16px;font-family:inherit}
  input:focus{outline:none;border-color:var(--accent)}
  button{width:100%;margin-top:16px;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--accent),#4f7cf0);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
  button:disabled{opacity:.6}
  #msg{margin-top:14px;text-align:center;font-size:13.5px;min-height:18px}
</style>
</head>
<body>
<div class="box">
  <div class="eyebrow">Acceso privado</div>
  <h1>Panel de Néstor</h1>
  <p class="sub">Introduce la contraseña para entrar.</p>
  <form id="f">
    <label>Contraseña</label>
    <input type="password" id="pw" autocomplete="current-password" required autofocus />
    <button type="submit" id="btn">Entrar</button>
    <div id="msg"></div>
  </form>
</div>
<script>
  var params = new URLSearchParams(location.search);
  var next = params.get('next') || '/panel';
  var f = document.getElementById('f');
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  f.addEventListener('submit', async function(e){
    e.preventDefault();
    btn.disabled = true; msg.style.color='var(--muted)'; msg.textContent='Comprobando...';
    try{
      var res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password: document.getElementById('pw').value, next: next })
      });
      var data = await res.json();
      if(res.ok){
        msg.style.color='#7fe3c8'; msg.textContent='✅ Acceso correcto';
        location.href = data.next || '/panel';
      } else {
        msg.style.color='#ff6b6b'; msg.textContent = data.error || 'Error';
        btn.disabled = false;
      }
    }catch(err){
      msg.style.color='#ff6b6b'; msg.textContent = 'Error de conexión';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
